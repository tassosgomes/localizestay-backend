        lifecycleStatus: { $ref: '#/components/schemas/OnboardingLifecycleStatus' }
        readinessStatus: { $ref: '#/components/schemas/ReadinessStatus' }
        openPendingIssueCount: { type: integer, minimum: 0, example: 1 }
        blockingReasons:
          type: array
          items: { $ref: '#/components/schemas/BlockingReason' }
          example: []
        openedAt: { type: string, format: date-time, example: '2026-07-18T13:30:00Z' }
        targetSubmissionAt: { type: string, format: date-time, example: '2026-08-01T21:00:00Z' }
        updatedAt: { type: string, format: date-time, example: '2026-07-18T13:30:00Z' }

