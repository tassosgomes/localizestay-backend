        status: { $ref: '#/components/schemas/PendingIssueStatus' }
        resolutionNote: { type: [string, 'null'], maxLength: 1000, example: Autorização formal validada. }

    CommunicationRecord:
      type: object
      required: [id, channel, receivedAt, processedAt, resultSummary, processedWithinSla, createdBy, createdAt]
