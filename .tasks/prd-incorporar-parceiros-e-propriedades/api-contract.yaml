        name: { type: string, minLength: 2, maxLength: 180, example: Pousada Mar do Sol Boutique }
        address: { $ref: '#/components/schemas/Address' }

    PropertyOnboardingListResponse:
      type: object
      required: [data, pagination]
      properties:
        data:
          type: array
          items: { $ref: '#/components/schemas/PropertyOnboardingSummary' }
