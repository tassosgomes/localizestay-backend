        reasonCode:
          type: string
          enum: [partnerWithdrawal, eligibilityFailure, noResponse, duplicateProperty, commercialDecision, other]
          example: partnerWithdrawal
        reason:
          type: string
          minLength: 10
          maxLength: 1000
          example: O parceiro solicitou a interrupção da avaliação neste ciclo.

    HistoryEntry:
      type: object
      required: [id, type, occurredAt, actorId, summary]
      properties:
        id: { type: string, format: uuid, example: 988dfbb9-b013-498d-8149-d0ced9fe4a20 }
        type:
          type: string
          enum: [onboardingOpened, propertyUpdated, gateUpdated, issueOpened, issueUpdated, communicationRecorded, duplicateReviewed, submittedToCuration, returnedByCuration, onboardingClosed]
          example: gateUpdated
        occurredAt: { type: string, format: date-time, example: '2026-07-18T15:20:00Z' }
        actorId: { type: string, example: logto|staff-0192 }
        summary: { type: string, example: Gate de contrato assinado validado. }
        metadata:
          type: object
          additionalProperties: true
          example: { gateType: signedContract, previousStatus: pending, newStatus: validated }

    HistoryListResponse:
      type: object
      required: [data, pagination]
      properties:
        data:
          type: array
          items: { $ref: '#/components/schemas/HistoryEntry' }
          example: []
        pagination: { $ref: '#/components/schemas/Pagination' }

    MetricRatio:
      type: object
      required: [numerator, denominator, percentage]
      properties:
        numerator: { type: integer, minimum: 0, example: 7 }
        denominator: { type: integer, minimum: 0, example: 8 }
        percentage: { type: number, minimum: 0, maximum: 100, example: 87.5 }

    StatusCount:
      type: object
      required: [status, count]
      properties:
        status: { $ref: '#/components/schemas/OnboardingLifecycleStatus' }
        count: { type: integer, minimum: 0, example: 5 }

    PropertyOnboardingMetrics:
      type: object
      required:
        [from, to, totalOpened, propertiesPreparedForCuration, submittedWithinTenBusinessDays,
         curationReturnRate, completeGatesSubmissionRate, communicationsWithinFourBusinessHours, byLifecycleStatus]
      properties:
        from: { type: string, format: date-time, example: '2026-07-01T00:00:00Z' }
        to: { type: string, format: date-time, example: '2026-08-01T00:00:00Z' }
        totalOpened: { type: integer, minimum: 0, example: 9 }
        propertiesPreparedForCuration: { type: integer, minimum: 0, example: 8 }
        submittedWithinTenBusinessDays: { $ref: '#/components/schemas/MetricRatio' }
        curationReturnRate: { $ref: '#/components/schemas/MetricRatio' }
        completeGatesSubmissionRate: { $ref: '#/components/schemas/MetricRatio' }
        communicationsWithinFourBusinessHours: { $ref: '#/components/schemas/MetricRatio' }
        byLifecycleStatus:
          type: array
          items: { $ref: '#/components/schemas/StatusCount' }
          example: []

    ValidationError:
      type: object
      required: [code, message]
      properties:
        field: { type: [string, 'null'], example: legalIdentifier.value }
        code: { type: string, example: INVALID_LEGAL_IDENTIFIER }
        message: { type: string, example: O identificador legal não atende ao formato esperado. }

    ProblemDetails:
      type: object
      description: RFC 9457 Problem Details com extensões estáveis da LocalizeStay.
      required: [type, title, status, code, traceId]
      properties:
        type: { type: string, format: uri-reference, example: https://api.localizestay.com/problems/onboarding-not-ready }
        title: { type: string, example: Incorporação ainda não está pronta }
        status: { type: integer, minimum: 400, maximum: 599, example: 422 }
        detail: { type: [string, 'null'], example: Existem gates ou pendências que impedem o encaminhamento. }
        instance: { type: [string, 'null'], format: uri-reference, example: /api/v1/property-onboardings/8f881f31-05fd-4af0-bf29-e6ef08f10119 }
        code: { type: string, example: ONBOARDING_NOT_READY }
        traceId: { type: string, example: 00-4bf92f3577b34da6a3ce929d0e0e4736-00f067aa0ba902b7-01 }
        errors:
          type: array
          items: { $ref: '#/components/schemas/ValidationError' }
