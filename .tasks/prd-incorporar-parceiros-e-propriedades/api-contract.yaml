    CreateCommunicationRecordRequest:
      type: object
      required: [channel, receivedAt, processedAt, resultSummary]
      properties:
        channel: { type: string, enum: [whatsapp, email], example: whatsapp }
        receivedAt: { type: string, format: date-time, example: '2026-07-18T10:00:00Z' }
        processedAt: { type: string, format: date-time, example: '2026-07-18T12:30:00Z' }
        resultSummary: { type: string, minLength: 3, maxLength: 1000, example: Responsável enviou a referência da autorização formal. }

    CreateDuplicateReviewRequest:
