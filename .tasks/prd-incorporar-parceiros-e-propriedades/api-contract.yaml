        id: { type: string, format: uuid, example: 7aa6d76d-50ca-4807-a46f-2bb5f1cfa8ef }
        channel: { type: string, enum: [whatsapp, email], example: whatsapp }
        receivedAt: { type: string, format: date-time, example: '2026-07-18T10:00:00Z' }
        processedAt: { type: string, format: date-time, example: '2026-07-18T12:30:00Z' }
        resultSummary: { type: string, example: Responsável enviou a referência da autorização formal. }
        processedWithinSla: { type: boolean, example: true }
        createdBy: { type: string, example: logto|staff-0192 }
