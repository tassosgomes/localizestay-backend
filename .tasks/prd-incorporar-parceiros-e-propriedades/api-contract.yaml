        pagination:
          $ref: '#/components/schemas/Pagination'

    PropertyOnboardingSummary:
      type: object
      required:
        [id, partnerId, partnerDisplayName, propertyName, destinationId, lifecycleStatus,
         readinessStatus, openPendingIssueCount, blockingReasons, openedAt, targetSubmissionAt, updatedAt]
      properties:
        id: { type: string, format: uuid, example: 8f881f31-05fd-4af0-bf29-e6ef08f10119 }
        partnerId: { type: string, format: uuid, example: 6b22179c-0143-4a70-97d3-c9648d77666a }
        partnerDisplayName: { type: string, example: Pousada Mar do Sol }
        propertyName: { type: string, example: Pousada Mar do Sol }
