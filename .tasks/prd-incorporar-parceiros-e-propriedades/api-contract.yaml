        curationReference: { type: [string, 'null'], example: curation-review-0081 }
        reasonCode: { type: string, enum: [missingData, inconsistentData], example: inconsistentData }
        reason: { type: string, example: Dados cadastrais inconsistentes com a evidência apresentada. }
        issues:
          type: array
          minItems: 1
          items: { $ref: '#/components/schemas/CurationReturnIssueInput' }
        returnedAt: { type: string, format: date-time, example: '2026-07-29T14:00:00Z' }
