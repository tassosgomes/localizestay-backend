        decision:
          type: string
          enum: [notDuplicate, duplicateOfExistingProperty]
          example: notDuplicate
        existingPropertyId:
          type: [string, 'null']
          format: uuid
          description: Obrigatório quando decision for duplicateOfExistingProperty.
          example: null
        justification:
          type: string
          minLength: 10
          maxLength: 1000
          example: Endereços próximos, porém estabelecimentos e inscrições legais distintos.

    DuplicateReview:
      type: object
