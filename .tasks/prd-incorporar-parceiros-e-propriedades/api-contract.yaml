        [id, partnerId, preselectionId, property, lifecycleStatus, readinessStatus, readinessGates,
         pendingIssues, duplicateReview, blockingReasons, openedAt, targetSubmissionAt, createdAt, updatedAt]
      properties:
        id: { type: string, format: uuid, example: 8f881f31-05fd-4af0-bf29-e6ef08f10119 }
        partnerId: { type: string, format: uuid, example: 6b22179c-0143-4a70-97d3-c9648d77666a }
        preselectionId: { type: string, example: preselection-2026-0042 }
        property:
          $ref: '#/components/schemas/PropertyInput'
        lifecycleStatus:
          $ref: '#/components/schemas/OnboardingLifecycleStatus'
        readinessStatus:
          $ref: '#/components/schemas/ReadinessStatus'
        readinessGates:
          type: array
          minItems: 6
          maxItems: 6
          items: { $ref: '#/components/schemas/ReadinessGate' }
          example: []
        pendingIssues:
          type: array
          items: { $ref: '#/components/schemas/PendingIssue' }
          example: []
        duplicateReview:
          $ref: '#/components/schemas/DuplicateReviewState'
        blockingReasons:
          type: array
          items: { $ref: '#/components/schemas/BlockingReason' }
          example: []
        openedAt: { type: string, format: date-time, example: '2026-07-18T13:30:00Z' }
        targetSubmissionAt:
          type: string
          format: date-time
          description: Prazo calculado de dez dias úteis segundo o calendário configurado.
          example: '2026-08-01T21:00:00Z'
        submittedAt: { type: [string, 'null'], format: date-time, example: null }
        closedAt: { type: [string, 'null'], format: date-time, example: null }
        closeReason: { type: [string, 'null'], example: null }
        createdAt: { type: string, format: date-time, example: '2026-07-18T13:30:00Z' }
        updatedAt: { type: string, format: date-time, example: '2026-07-18T13:30:00Z' }

    CreatePropertyOnboardingRequest:
      type: object
      required: [partnerId, preselectionId, property]
      properties:
        partnerId: { type: string, format: uuid, example: 6b22179c-0143-4a70-97d3-c9648d77666a }
        preselectionId: { type: string, example: preselection-2026-0042 }
        property:
          $ref: '#/components/schemas/PropertyInput'

    UpdatePropertyOnboardingRequest:
      type: object
