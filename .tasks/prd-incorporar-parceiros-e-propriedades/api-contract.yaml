        description: { type: string, minLength: 3, maxLength: 1000, example: Confirmar poderes do responsável indicado. }
        ownerType: { $ref: '#/components/schemas/PendingOwnerType' }
        assigneeId: { type: [string, 'null'], maxLength: 120, example: null }
        relatedGateType:
          oneOf:
            - $ref: '#/components/schemas/ReadinessGateType'
            - type: 'null'
        targetAt: { type: [string, 'null'], format: date-time, example: '2026-07-21T18:00:00Z' }

    UpdatePendingIssueRequest:
      type: object
