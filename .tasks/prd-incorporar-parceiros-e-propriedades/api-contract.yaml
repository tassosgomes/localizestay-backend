        decision: { type: string, enum: [notDuplicate, duplicateOfExistingProperty], example: notDuplicate }
        existingPropertyId: { type: [string, 'null'], format: uuid, example: null }
        justification: { type: string, example: Endereços próximos, porém estabelecimentos e inscrições legais distintos. }
        reviewedAt: { type: string, format: date-time, example: '2026-07-19T14:00:00Z' }
