name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

env:
  DOTNET_VERSION: "10.0.x"
  DOTNET_NOLOGO: "true"
  DOTNET_CLI_TELEMETRY_OPTOUT: "true"
  IMAGE_NAME: ghcr.io/tassosgomes/localizestay-api

jobs:
  build-and-test:
    name: Build, unit and architecture tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore LocalizeStay.sln

      - name: Build
        run: dotnet build LocalizeStay.sln --no-restore --configuration Release

      - name: Unit tests
        run: >
          dotnet test tests/LocalizeStay.UnitTests/LocalizeStay.UnitTests.csproj
          --no-build --configuration Release
          --logger "trx;LogFileName=unit-tests.trx"
          --results-directory TestResults

      - name: Architecture tests
        run: >
          dotnet test tests/LocalizeStay.ArchitectureTests/LocalizeStay.ArchitectureTests.csproj
          --no-build --configuration Release
          --logger "trx;LogFileName=architecture-tests.trx"
          --results-directory TestResults

      - name: Publish test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: TestResults/**/*.trx
          retention-days: 14

  publish-image:
    name: Build and push image (main only)
    needs: build-and-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compute short SHA
        id: sha
        run: echo "short=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:sha-${{ steps.sha.outputs.short }}
            ${{ env.IMAGE_NAME }}:dev
          cache-from: type=gha
          cache-to: type=gha,mode=max
